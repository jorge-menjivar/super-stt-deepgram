# SPDX-License-Identifier: GPL-3.0-only
#:schema https://jorge-menjivar.github.io/super-stt/backend.schema.json
# Deepgram backend configuration. See docs/protocol/backend/config.md.

[backend]
    source = "github.com/jorge-menjivar/super-stt-deepgram"
    name = "Deepgram"
    version = "0.1.0"
    kind = "wasm"
    entrypoint = "deepgram.wasm"
    contract = "v1"
    license = "GPL-3.0-only"
    description = "Cloud speech-to-text via the Deepgram API."

[assets]
    # Filename of the wasm component attached to the GitHub release. The indexer
    # hashes these bytes into the registry's manifest pin; must match `entrypoint`.
    wasm = "deepgram.wasm"

[network]
    allowed_hosts = ["api.deepgram.com"]

[[secrets]]
    name = "deepgram_api_key"
    label = "Deepgram API key"
    description = "Used to authenticate requests to api.deepgram.com."
    required = true

[[models]]
    name = "nova-3"
    provider = "deepgram"
    multilingual = true
    primary_language = "en"
    # nova-3 batch language codes (Deepgram's exact `language=` values, forwarded
    # verbatim), including regional/script variants. Auto-detect is the reserved
    # `language=auto`, which the component maps to Deepgram's `multi` mode.
    supported_languages = [
        "ar", "ar-AE", "ar-SA", "ar-QA", "ar-KW", "ar-SY", "ar-LB", "ar-PS", "ar-JO", "ar-EG", "ar-SD", "ar-TD", "ar-MA", "ar-DZ", "ar-TN", "ar-IQ", "ar-IR",
        "be", "bn", "bs", "bg", "ca",
        "zh", "zh-CN", "zh-Hans", "zh-TW", "zh-Hant", "zh-HK",
        "hr", "cs",
        "da", "da-DK",
        "nl", "nl-BE",
        "en", "en-US", "en-AU", "en-GB", "en-IN", "en-NZ",
        "et", "fi",
        "fr", "fr-CA",
        "de", "de-CH",
        "el",
        "gu", "gu-IN",
        "he", "hi", "hu", "id", "it", "ja", "kn",
        "ko", "ko-KR",
        "lv", "lt", "mk", "ms", "mr", "no", "fa", "pl",
        "pt", "pt-BR", "pt-PT",
        "ro", "ru", "sr", "sk", "sl",
        "es", "es-419",
        "sv", "sv-SE",
        "tl", "ta", "te",
        "th", "th-TH",
        "tr", "uk", "ur", "vi",
    ]
    supported_devices = ["none"]
