# SPDX-License-Identifier: GPL-3.0-only
#:schema https://jorge-menjivar.github.io/super-stt/backend.schema.json
# Deepgram backend configuration. See docs/protocol/backend/config.md.

[backend]
    source = "github.com/jorge-menjivar/super-stt-deepgram"
    name = "Deepgram"
    version = "0.1.0"
    kind = "wasm"
    entrypoint = "deepgram.wasm"
    contract = "v1"
    license = "GPL-3.0-only"

[assets]
    # Filename of the wasm component attached to the GitHub release. The indexer
    # hashes these bytes into the registry's manifest pin; must match `entrypoint`.
    wasm = "deepgram.wasm"

[network]
    allowed_hosts = ["api.deepgram.com"]

[[secrets]]
    name = "deepgram_api_key"
    label = "Deepgram API key"
    description = "Used to authenticate requests to api.deepgram.com."
    required = true

[[models]]
    name = "nova-3"
    provider = "deepgram"
    multilingual = true
    primary_language = "en"
    supported_languages = ["en"]
    supported_devices = ["none"]
